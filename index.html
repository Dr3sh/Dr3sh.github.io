<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dr3sh's Studio</title>
    <link href="https://fonts.cdnfonts.com/css/montserrat" rel="stylesheet">
    <style>
        /* (el mismo CSS que la versión anterior, sin cambios) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #212224;
            font-family: 'Montserrat', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 32px 24px;
            color: #E8EDDF;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(33, 34, 36, 0.65);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        header {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }
        .brand img {
            max-width: 220px;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            transition: transform 0.25s ease;
        }
        .brand img:hover {
            transform: scale(1.02);
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(27, 125, 79, 0.5), rgba(6, 104, 57, 0.8), rgba(27, 125, 79, 0.5), transparent);
            margin: 12px 0 28px 0;
        }

        .servidores-list {
            display: flex;
            flex-direction: column;
            gap: 36px;
        }

        .server {
            background: #2C2C2C;
            border-radius: 28px;
            padding: 28px 24px 24px;
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.35);
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .server:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 32px -12px black;
            border-color: #1B7D4F;
        }

        .server > img {
            display: block;
            max-width: 85%;
            height: auto;
            margin: 0 auto 24px auto;
            border-radius: 24px;
            background: rgba(0,0,0,0.2);
            padding: 6px;
            object-fit: contain;
            transition: all 0.2s;
        }

        .server > h2.lead {
            font-size: 1.55rem;
            font-weight: 600;
            margin: 12px 0 16px;
            text-align: center;
            color: #E8EDDF;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .versions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .version {
            background: #3A3A3A;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.4);
        }

        .version .title {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            transition: background 0.2s;
        }
        .version .title:hover {
            background: rgba(27, 125, 79, 0.3);
        }
        .version .title h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.2px;
            color: #F0F5EA;
        }

        .version .title::after {
            content: "▾";
            font-size: 1.5rem;
            transition: transform 0.25s ease;
            opacity: 0.8;
        }
        .version.active .title::after {
            transform: rotate(180deg);
        }

        .version .content {
            max-height: 0;
            padding: 0 24px;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.2s;
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid transparent;
        }
        .version.active .content {
            max-height: 500px;
            padding: 20px 24px 24px;
            border-top-color: rgba(27, 125, 79, 0.6);
        }
        .version .content p {
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #D4E0D0;
        }

        .download-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .download-row input[type="submit"],
        .download-row .link-btn {
            background: #066839;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .download-row input[type="submit"]:hover,
        .download-row .link-btn:hover {
            background: #1B7D4F;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }
        .download-row .link-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 860px) {
            body { padding: 20px 16px; }
            .container { padding: 20px 16px; }
            .server { padding: 18px 12px; }
            .version .title h1 { font-size: 1.1rem; }
            .server > h2.lead { font-size: 1.2rem; }
            .download-row input[type="submit"], .download-row .link-btn { padding: 8px 16px; font-size: 0.85rem; }
            .brand img { max-width: 150px; }
        }
        @media (max-width: 580px) {
            .server > img { max-width: 95%; }
            .version .content { padding: 0 16px; }
            .version.active .content { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="brand">
            <img src="assets/logo.svg" alt="Dr3sh's Project Logo">
        </div>
    </header>
    <hr>
    <div class="servidores-list">
        <!-- Las secciones estáticas se mantienen, pero se ocultarán/eliminarán dinámicamente si el servidor está hidden -->
        <section class="server" data-server="expediciones" id="server-expediciones" aria-label="Expediciones">
            <img src="assets/expediciones_title2.png" alt="expediciones">
            <h2 class="lead"></h2>
            <div class="versions" data-server="expediciones"></div>
        </section>
        <section class="server" data-server="otroServidor" id="server-otroServidor" aria-label="Otro Servidor" style="display:none;">
            <img src="assets/otro_title.png" alt="otro servidor" onerror="this.style.display='none'">
            <h2 class="lead">Descripción breve del otro servidor. Sustituye este texto por la descripción real cuando añadas versiones para este servidor.</h2>
            <div class="versions" data-server="otroServidor"></div>
        </section>
    </div>
</div>

<script>
    let currentETag = null;
    let currentLastModified = null;
    const CHECK_INTERVAL_MS = 30000;

    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }
    function escapeAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }

    // Función que, dado el array de serversMeta (ya filtrados por status !== 'hidden'), crea/actualiza las secciones
    function applyServerMetadata(serversMeta) {
        // Ocultar primero todas las secciones .server que no estén en la lista de servidores activos
        const allSections = document.querySelectorAll('.server');
        allSections.forEach(section => {
            section.style.display = 'none';
        });

        serversMeta.forEach(s => {
            if (!s || !s.id) return;
            const safeId = String(s.id);
            let section = document.querySelector(`.server[data-server="${safeId}"]`);
            if (!section) {
                // No existe la sección en HTML, la creamos
                const list = document.querySelector('.servidores-list');
                if (!list) return;
                section = document.createElement('section');
                section.className = 'server';
                section.setAttribute('data-server', safeId);
                section.id = 'server-' + safeId;
                section.setAttribute('aria-label', s.title || safeId);
                section.innerHTML = `<img src="${escapeAttr(s.image || '')}" alt="${escapeAttr(s.title || safeId)}" onerror="this.style.display='none'"><h2 class="lead">${escapeHtml(s.description || '')}</h2><div class="versions" data-server="${escapeAttr(safeId)}"></div>`;
                list.appendChild(section);
            } else {
                // Actualizar imagen y descripción
                if (s.image) {
                    let img = section.querySelector('img');
                    if (!img) {
                        img = document.createElement('img');
                        section.insertBefore(img, section.firstChild);
                    }
                    img.src = s.image;
                    img.alt = s.title || safeId;
                    img.style.display = '';
                }
                if (s.description) {
                    let lead = section.querySelector('h2.lead');
                    if (!lead) {
                        lead = document.createElement('h2');
                        lead.className = 'lead';
                        section.appendChild(lead);
                    }
                    lead.textContent = s.description;
                }
                // Asegurar que está visible
                section.style.display = '';
            }
        });
    }

    function renderGroupedVersions(versions) {
        // Se renderizan todas las versiones sin filtrar por status de versión (solo se agrupan por servidor)
        const containers = document.querySelectorAll('.versions');
        containers.forEach(c => c.innerHTML = '');
        if (!Array.isArray(versions)) versions = [];

        versions.forEach(v => {
            const serverId = v.server || 'expediciones';
            const container = document.querySelector(`.versions[data-server="${serverId}"]`);
            if (!container) return; // si el contenedor no existe (porque el servidor está oculto), no se añade la versión
            const div = document.createElement('div');
            div.className = 'version';
            div.dataset.id = v.id || '';
            div.innerHTML = `
                <div class="title"><h1 title="${escapeAttr(v.title || '')}">${escapeHtml(v.title)}</h1></div>
                <div class="content">
                    <p>${escapeHtml(v.description || '')}</p>
                    <div class="download-row">
                        <form action="${escapeAttr(v.link || '#')}" method="get" target="_blank">
                            <input type="submit" value="Descargar Modpack">
                        </form>
                        ${v.extra_link ? `<a class="link-btn" href="${escapeAttr(v.extra_link)}" target="_blank">Más info</a>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(div);
        });
    }

    async function fetchVersionsAndRender() {
        try {
            const res = await fetch('/versions.json', { cache: 'no-cache' });
            if (!res.ok) return;
            const data = await res.json();
            let versions = [];
            let serversMeta = [];

            if (Array.isArray(data)) {
                versions = data;
            } else if (data && typeof data === 'object') {
                versions = Array.isArray(data.versions) ? data.versions : [];
                serversMeta = Array.isArray(data.servers) ? data.servers : [];
            }

            // FILTRAR SOLO SERVIDORES CON STATUS DIFERENTE DE "hidden" (case-insensitive? asumimos minúsculas)
            const activeServersMeta = serversMeta.filter(s => s.status !== 'hidden');

            // Aplicar metadatos de servidores activos (crea/actualiza secciones)
            applyServerMetadata(activeServersMeta);

            // Renderizar versiones (todas, sin filtrar por estado de versión)
            renderGroupedVersions(versions);

            // Limpiar imágenes vacías (ocultar si no tienen src)
            document.querySelectorAll('.server').forEach(section => {
                const img = section.querySelector('img');
                if (img && (!img.src || img.src.trim() === '')) img.style.display = 'none';
            });
        } catch(e) { console.warn(e); }
    }

    async function checkAndUpdate() {
        try {
            const head = await fetch('/versions.json', { method: 'HEAD', cache: 'no-cache' });
            if (!head.ok) return;
            const etag = head.headers.get('etag');
            const lastMod = head.headers.get('last-modified');
            const changed = (etag && etag !== currentETag) ||
                            (!etag && lastMod && lastMod !== currentLastModified) ||
                            (etag === null && lastMod === null && currentETag === null && currentLastModified === null);
            if (changed) {
                currentETag = etag;
                currentLastModified = lastMod;
                await fetchVersionsAndRender();
            }
        } catch(err) { console.warn(err); }
    }

    // Acordeón
    document.addEventListener('click', (e) => {
        const title = e.target.closest('.title');
        if (title) {
            const v = title.closest('.version');
            if (!v) return;
            const all = document.querySelectorAll('.version');
            const isActive = v.classList.contains('active');
            all.forEach(x => x.classList.remove('active'));
            if (!isActive) v.classList.add('active');
            return;
        }
        if (!e.target.closest('.version')) {
            document.querySelectorAll('.version').forEach(x => x.classList.remove('active'));
        }
    });

    (function init() {
        fetchVersionsAndRender();
        setInterval(checkAndUpdate, CHECK_INTERVAL_MS);
    })();
</script>
</body>
</html>
